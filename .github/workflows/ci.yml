name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - run: go test ./...
      - run: go build ./...
      - run: go vet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest && gosec ./...
      - run: |
          if command -v markdownlint >/dev/null; then markdownlint skill/opsmask/SKILL.md; fi
