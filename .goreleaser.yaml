version: 2
project_name: opsmask
builds:
  - id: opsmask
    main: ./cmd/opsmask
    binary: opsmask
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
archives:
  - id: archive
    files:
      - README.md
      - LICENSE*
      - skill/opsmask/**
checksum:
  name_template: "checksums.txt"
sboms:
  - artifacts: archive
